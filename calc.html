<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Istok+Web' rel='stylesheet'>
    <link rel="stylesheet" href="Calc.css">
    <title>Career Selection</title>
</head>
<body>
    <header>
        <div class="header-container">
            <img src="./imgs/eecu-logo 1.png" alt="Background image for landing page" class="eecu-logo">
            <h1 class="top">EECU Wise-Up Budget Calculator</h1>
        </div>
    </header>
    <main>
        <section class="cards1">
    
    <label id="career-info">
        <!-- Career information will be displayed here -->
    </label>

        <select id="career-dropdown">
            <option value="">-- Choose a Career --</option>   
        </select>
        </select>
        <div id="career-details">
            <p>Job Title: <span id="display-name">N/A</span></p>
            <p> Annual Salary: <span id="display-salary">N/A $ Annually</span></p>
        </div>
        </section>
    <section class="cards2">          
    <label class="Standard-Deduction">
        <h2>Standard Deduction</h2>
        <p>$16,100.00</p>
    </label>
    </section>
    <section class="cards3">
    <label class="Estimated-Monthly-After-Taxes">
        <h2> Estimated Monthly After Taxes</h2>
        <h2>$ Monthly</h2>
    </label>

    <section class="cards4">
    <label class="Taxes">
        <h2>Taxes</h2>
        <h2> medicare:</h2>
        <h2>1.45%</h2>
        <h2>Social Security</h2>
        <h2>N/A%</h2>
    </label>
    </section>
    </main>
<a href="results.html" class="cntueBtn">Continue</a>

<script src="./JavaScript/fetch-Data-API.js"></script>
</body>
</html>
